<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NCA Digital Skills — Attendance{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        [x-cloak]{display:none}
        * { font-family: 'Poppins', sans-serif; }
    </style>
    <script src="https://unpkg.com/alpinejs" defer></script>
</head>
<body class="min-h-screen bg-[#f5f5e0] text-[#3d3520] flex flex-col">

    {% include "core/partials/navbar.html" %}

    <!-- Flash messages -->
    {% if messages %}
    <div class="w-full px-6 pt-4">
        {% for message in messages %}
        <div class="max-w-4xl mx-auto mb-2 px-4 py-3 rounded-md text-sm font-medium
            {% if message.tags == 'error' %}bg-red-100 text-red-800 border border-red-300
            {% elif message.tags == 'success' %}bg-green-100 text-green-800 border border-green-300
            {% elif message.tags == 'warning' %}bg-yellow-100 text-yellow-800 border border-yellow-300
            {% else %}bg-[#e8d5a3] text-[#3d3520] border border-[#d4821a]/40{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <main class="flex-1">
        {% block content %}{% endblock content %}
    </main>

    {% include "core/partials/footer.html" %}

</body>
</html>
